# DEV on aziron-virtual-machine (172.30.47.194)
# On the VM:  docker compose build && docker compose up -d --no-deps
# From your laptop:  ./scripts/deploy-dev.sh

name: aziron-uiux

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: aziron-uiux:dev
    container_name: aziron-uiux-dev
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=development
