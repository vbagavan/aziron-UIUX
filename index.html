<!doctype html>
<html lang="en" class="theme-blue">
  <head>
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("aziron-theme-mode") || "light";
          var color = localStorage.getItem("aziron-theme-color") || "blue";
          var root = document.documentElement;
          var isDark =
            mode === "dark" ||
            (mode === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) root.classList.add("dark");
          ["blue", "green", "orange", "purple", "amethyst-haze", "blaze-orange", "graphite"].forEach(
            function (c) {
              root.classList.toggle("theme-" + c, c === color);
            },
          );
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aziron</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
